<!DOCTYPE html>
<html lang="es">
<head>
	<!--
		Proyecto: Real Madrid con JSON
		Ejercicio 1:
		- Lee un archivo JSON mediante fetch().
		- Convierte la respuesta a un array de objetos JavaScript con response.json().
		- Genera dinámicamente elementos <li> dentro de una lista ordenada.
	-->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ejercicio 1 - Lista de jugadores del Real Madrid con JSON</title>
	<style>
		/* Estilos generales de la página. */
		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
			color: #0f172a;
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 1rem;
			box-sizing: border-box;
		}

		/* Contenedor principal del ejercicio. */
		main {
			width: 100%;
			max-width: 42rem;
			padding: 2rem;
			background: #ffffff;
			border-radius: 1rem;
			box-shadow: 0 0.75rem 2rem rgba(15, 23, 42, 0.12);
		}

		h1 {
			margin-top: 0;
			margin-bottom: 0.75rem;
		}

		p {
			line-height: 1.5;
		}

		/* Zona donde se mostrará la lista creada con JavaScript. */
		#display {
			margin-top: 1rem;
			padding: 1rem;
			border-radius: 0.75rem;
			background: #f8fafc;
			border: 1px solid #cbd5e1;
		}
		/* Botón que dispara la carga del JSON. */
		button {
			padding: 0.85rem 1.2rem;
			border: none;
			border-radius: 0.7rem;
			background: #2563eb;
			color: #ffffff;
			font-size: 1rem;
			font-weight: bold;
			cursor: pointer;
		}

		button:hover {
			background: #1d4ed8;
		}

		/* Enlace para volver al índice del proyecto. */
		.volver {
			display: inline-block;
			margin-top: 1rem;
			padding: 0.7rem 1rem;
			border-radius: 0.7rem;
			background: #e2e8f0;
			color: #1e293b;
			text-decoration: none;
			font-weight: 600;
		}

		.volver:hover {
			background: #cbd5e1;
		}
	</style>
</head>
<body>
	<main>
		<h1>Ejercicio 1: lista de jugadores del Real Madrid con JSON</h1>
		<p>Este ejemplo carga los datos desde un archivo JSON y crea dinámicamente un elemento de lista por cada jugador.</p>
		<button id="cargarlista" type="button">Cargar lista de jugadores</button>
		<div id="display">
			<!-- La lista empieza vacía. JavaScript insertará aquí los <li>. -->
			<ol id="lista-jugadores">

			</ol>
		</div>
		<a class="volver" href="../index.html">Volver al índice</a>
	</main>
	<script>
		// Asociamos el click del botón con la función principal del ejercicio.
		document.getElementById("cargarlista").addEventListener("click", cargarLista);

		/*
			Flujo del ejercicio:
			1. Hacemos una petición HTTP al archivo jugadores.json.
			2. Convertimos la respuesta a un array de objetos JavaScript.
			3. Dentro del bloque .then(...) creamos todos los nodos de la lista.
			4. Si la carga falla, mostramos el error en consola.
		*/
		function cargarLista() {
			fetch("jugadores.json")
				.then(function(respuesta) {
					return respuesta.json();
				})
				.then(function(jugadores) {
					// Vaciamos la lista para evitar elementos duplicados si se pulsa varias veces.
					document.getElementById("lista-jugadores").innerHTML = "";

					// Recorremos el array de objetos y creamos un <li> por cada jugador.
					for (let i = 0; i < jugadores.length; i++) {
						// Creamos el nodo de lista en memoria.
						let nuevoLi = document.createElement("li");
						// Añadimos estilos inline para que cada jugador quede visualmente separado.
						nuevoLi.setAttribute("style", "padding: 0.5rem; background: #ffffff; border: 1px solid #cbd5e1; border-radius: 0.75rem; margin-bottom: 0.5rem;");
						// Extraemos y mostramos la propiedad nombre del objeto actual.
						nuevoLi.innerHTML = jugadores[i].nombre;
						// Insertamos el nuevo <li> dentro de la lista ordenada del documento.
						document.getElementById("lista-jugadores").appendChild(nuevoLi);
					}
				})
				.catch(function(error) {
					// Este bloque solo se ejecuta si la petición o el parseo del JSON fallan.
					console.error("Error al cargar jugadores.json:", error);
				});
		}
	</script>
</body>
</html>
